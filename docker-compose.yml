services:
  db:
    image: mysql:8.0
    container_name: school_db
    environment:
      MYSQL_DATABASE: SMS
      MYSQL_ROOT_PASSWORD: academix_sms
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - school-network
    healthcheck:
      # A pure raw TCP port connection check requires practically zero RAM/CPU overhead
      test: ["CMD", "nc", "-z", "127.0.0.1", "3306"]
      timeout: 5s
      retries: 10
      interval: 10s
      start_period: 90s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/SMS?useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=academix_sms
    depends_on:
      db:
        condition: service_healthy
    networks:
      - school-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - school-network

volumes:
  mysql_data:

networks:
  school-network:
    driver: bridge