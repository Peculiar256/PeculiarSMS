spring.application.name=server

# Server Configuration - Force port 8080
server.port=8080
server.shutdown=graceful

# Optional: Kill any existing process on port 8080
management.endpoint.shutdown.enabled=true
management.endpoints.web.exposure.include=health,info,shutdown

# we shiftinng now to use MYSQL for Production 
# Update the database name and password below
spring.datasource.url=jdbc:mysql://localhost:3306/SMS?useSSL=false&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=academix_sms
# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=academix-jwt-secret-key-that-must-be-at-least-256-bits-long-for-hs256-algorithm-security
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# Email Configuration (Configure based on your email provider)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:conceptcrashers256@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:ecrzfoxkwoyntyyh}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
